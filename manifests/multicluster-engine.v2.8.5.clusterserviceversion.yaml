            matchLabels:
              control-plane: backplane-operator
          strategy: {}
          template:
            metadata:
              labels:
                control-plane: backplane-operator
                ocm-antiaffinity-selector: backplane-operator
            spec:
              affinity:
                podAntiAffinity:
                  preferredDuringSchedulingIgnoredDuringExecution:
                  - podAffinityTerm:
                      labelSelector:
                        matchExpressions:
                        - key: ocm-antiaffinity-selector
                          operator: In
                          values:
                          - backplane-operator
                      topologyKey: topology.kubernetes.io/zone
                    weight: 70
