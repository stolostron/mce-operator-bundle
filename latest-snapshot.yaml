    pac.test.appstudio.openshift.io/sha-title: |-
      Fix e2e leader election race condition and improve debugging (#1023)

      - Add more debugging info to E2E workflow failure logs: increase pod log
        tail from 100 to 500 lines, collect previous container logs
      - Fix e2e race condition by forcing agent pod restart before leader
        election check
      - Add delay before leader election check to avoid race with deployment
        rollout
      - Fix e2e leader election check by waiting for deployment rollout
        completion (updatedReplicas and availableReplicas match desired)

      Signed-off-by: xuezhaojun <zxue@redhat.com>
      Co-authored-by: Claude Opus 4.6 <noreply@anthropic.com>
