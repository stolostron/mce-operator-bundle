    pac.test.appstudio.openshift.io/sha-title: |-
      CNTRLPLANE-2678: add HCPEtcdBackup controller to HyperShift Operator (#8139)

      * feat(CNTRLPLANE-2678): add HCPEtcdBackup controller to HyperShift Operator

      Implements the HCPEtcdBackup reconciler that orchestrates etcd snapshot
      and upload Jobs. The controller watches HCPEtcdBackup CRs, validates
      etcd health, manages temporary RBAC and NetworkPolicy resources for
      cross-namespace access, creates 3-container backup Jobs (fetch-certs,
      snapshot, upload), tracks Job status via pod termination messages, and
      enforces count-based retention of completed backups.

      Key design decisions:
      - findJobForBackup runs before findActiveJob serial guard to prevent
        the controller from rejecting its own Job on re-reconcile
      - BackupRejected is a terminal state to prevent backup accumulation
        when concurrent backups are attempted
      - BackoffLimit=0 to avoid race conditions where Kubernetes retries a
        pod after the controller has already cleaned up RBAC
      - Cleanup errors are propagated (not swallowed) so controller-runtime
        retries on transient failures, preventing leaked resources
      - --etcd-backup-max-count is validated to be at least 1

      Adds EtcdBackupSucceeded condition type for HCP-to-HC status
      propagation. Controller is registered behind the HCPEtcdBackup
      feature gate.

      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
      Signed-off-by: Juan Manuel Parrilla Madrid <jparrill@redhat.com>

      * test(CNTRLPLANE-2678): add integration tests for HCPEtcdBackup controller

      Add integration tests that validate the HCPEtcdBackup controller
      end-to-end against a live management cluster with S3 and Azure Blob
      storage backends.

      Tests:
      - S3 happy path: backup completes with snapshotURL, RBAC/NetworkPolicy
        cleaned up, EtcdBackupSucceeded condition propagated to HCP
      - Azure Blob happy path: same validations for Azure storage
      - Invalid credentials: controller sets BackupFailed as terminal
        condition when credential Secret is missing

      waitForBackupCondition monitors both the CR condition and Job status
      to detect pod-level failures early (e.g. init container errors)
      instead of waiting for the full timeout.

      run.sh gains a `controller` subcommand that creates/destroys all
      cloud resources (S3 buckets, Azure RG/storage/SP, K8s Secrets)
      automatically via setup/teardown functions with EXIT trap.
      AWS credentials fallback now extracts only the [default] profile
      instead of copying the entire credentials file.

      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
      Signed-off-by: Juan Manuel Parrilla Madrid <jparrill@redhat.com>

      * fix(CNTRLPLANE-2678): prevent rejected backup from deleting shared resources

      When two HCPEtcdBackup CRs are created simultaneously, the second is
      rejected by the serial guard. However, the rejected backup entering a
      terminal state triggered cleanupResources, which deleted the NetworkPolicy
      and RBAC that the first (active) backup's Job still needs, causing it to
      timeout.

      Add an active Job guard to cleanupResources: before deleting shared
      resources, check if any backup Job is still running in the same HCP
      namespace. If so, skip the cleanup and log a message.

      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>
      Signed-off-by: Juan Manuel Parrilla Madrid <jparrill@redhat.com>

      ---------

      Signed-off-by: Juan Manuel Parrilla Madrid <jparrill@redhat.com>
      Co-authored-by: Claude Opus 4.6 <noreply@anthropic.com>
