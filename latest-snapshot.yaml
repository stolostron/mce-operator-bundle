    pac.test.appstudio.openshift.io/sha: 0b6bb685603a264288efaa5d19c2540813a22f67
    pac.test.appstudio.openshift.io/sha-title: |-
      Bump google.golang.org/grpc to v1.79.3 (#677)

      * Bump google.golang.org/grpc to v1.79.3

      Addresses CVE-2026-33186: gRPC-Go authorization bypass due to improper HTTP/2 path validation

      Signed-off-by: Roke Jung <rjung@redhat.com>
      Signed-off-by: Roke Jung <roke@redhat.com>
      Made-with: Cursor

      * Fix flaky upgrade tests exposed by gRPC/testify version bump

      The gRPC v1.79.3 bump transitively updated testify from v1.9.0 to
      v1.11.1, which changed assert.Eventually to check conditions immediately
      at t=0. This exposed pre-existing race conditions in the upgrade tests
      where UpgradeController.Start()/Stop() goroutines concurrently modified
      shared state.

      Replace Start()/Stop() + assert.Eventually(reinstallNeeded) blocks with
      a synchronous checkReinstallNeeded() helper that directly evaluates the
      same conditions without launching goroutines. This makes the tests
      deterministic and eliminates timing-dependent flakiness.

      Made-with: Cursor

      ---------

      Signed-off-by: Roke Jung <rjung@redhat.com>
      Signed-off-by: Roke Jung <roke@redhat.com>
