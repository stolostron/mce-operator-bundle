    pac.test.appstudio.openshift.io/sha-title: |-
      Add Red Hat Product Security CodeRabbit config (ARO-27646) (#391)

      * Add Red Hat Product Security CodeRabbit config (ARO-27646)

      Replace the basic CodeRabbit configuration with the comprehensive
      Red Hat Product Security prodsec-skills config. Adds security-focused
      path instructions (injection prevention, container hardening, K8s/OpenShift
      checks, supply chain, Go security, cryptographic standards), security
      scanners (gitleaks, semgrep, checkov, hadolint, trivy, osvScanner,
      actionlint, ast-grep), and pre-merge security gates.

      Preserves golangci-lint, markdown skip filter, and chat.auto_reply
      from the existing config.

      Ref: ARO-27646

      Assisted-by: Claude Code <noreply@anthropic.com>

      * fix: restore early_access and auto_apply_labels settings

      Self-review finding addressed before external review.
      The original config explicitly set early_access: false and
      auto_apply_labels: false. These were unintentionally removed
      when replacing with the prodsec-skills template, causing
      behavioral changes (defaulting to CodeRabbit's defaults).

      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * fix: address CodeRabbit finding - malformed glob pattern

      CodeRabbit finding #1 for PR #391:
      - File: .coderabbit.yaml:162
      - Fixed missing path separator in LLM interaction glob pattern
      - Changed: **/{llm,prompt,chat,completion}**/* -> **/{llm,prompt,chat,completion}/**/*

      Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>

      ---------

      Co-authored-by: Claude Opus 4.6 <noreply@anthropic.com>
