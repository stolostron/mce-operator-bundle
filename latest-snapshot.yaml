    pac.test.appstudio.openshift.io/sha-title: |-
      ACM-30906: Auto-detect AAP operator channel when unavailable (#6307)

      * ACM-30906: Auto-detect AAP operator channel when requested channel is unavailable

      Validate the requested operator channel against the OperatorHub catalog
      before installing. If the channel does not exist (e.g. stable-2.5 on
      OCP 4.22), fall back to auto-detecting the latest available stable
      channel. This allows callers like rhacmstackem to keep their defaults
      without needing updates when OCP drops older AAP channels.

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * ACM-30906: Address CodeRabbit review feedback

      Capture stderr from oc get packagemanifest and include it in the error
      message when the AAP operator is not found, so failures like permission
      errors or catalog unavailability are visible. Clarify the fallback log
      message to state the auto-selection behavior.

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      * ACM-30906: Clarify channel fallback log message

      Mention the secondary fallback to any available channel when no
      stable-* channels exist.

      Signed-off-by: Randy Bruno Piverger <21374229+Randy424@users.noreply.github.com>
      Co-Authored-By: Claude Opus 4.6 <noreply@anthropic.com>

      ---------

