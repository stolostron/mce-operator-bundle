    pac.test.appstudio.openshift.io/sha-title: |-
      fix: update hive bundle generation to use bundle-gen.sh (#3525)

      Hive rewrote bundle-gen from Python to shell script. Updated
      gen-hive-bundle.sh to call new bundle-gen.sh instead of bundle-gen.py.

      Changes:
      - Changed gen_tool path from hack/bundle-gen.py to hack/bundle-gen.sh
      - Switched from python3 to bash for execution
      - Fixed --dummy-bundle flag (no longer takes arg)
      - Added --skip-image-validation flag
      - Removed obsolete version2.py compatibility layer

