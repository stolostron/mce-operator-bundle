    pac.test.appstudio.openshift.io/sha-title: |-
      fix: disable codecov upload on backplane-2.11 (ARO-27418) (#291)

      * fix: disable codecov upload on backplane-2.11 (ARO-27418)

      The codecov upload step requires a CODECOV_TOKEN secret that is not
      configured in the stolostron repo. This was already disabled on main
      and backplane-2.17 but was missed on backplane-2.11, causing the
      coverage check to fail on all PRs targeting this branch.

      Root cause: backplane-2.11 is synced from upstream release-1.22 which
      still has the codecov step active. When main and backplane-2.17 were
      updated (via downstream build infra changes and upstream syncs
      respectively), this branch was not included.

      Ref: ARO-27418

      Co-Authored-By: Claude Opus 4.6 (1M context) <noreply@anthropic.com>

      * chore: retrigger CI

      Co-authored-by: Cursor <cursoragent@cursor.com>

