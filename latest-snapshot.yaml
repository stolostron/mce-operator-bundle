    pac.test.appstudio.openshift.io/sha-title: |-
      fix(cve): CVE-2026-32282 - update Go to 1.25.9 to fix os.Root.Chmod symlink escape (#339)

      - Update go directive from 1.24.0 to 1.25.9 in go.mod
      - Fixes GO-2026-4864: TOCTOU race condition in os.Root.Chmod allows
        symlink escape from container root when Linux AT_SYMLINK_NOFOLLOW
        flag is silently ignored by fchmodat syscall
      - Post-fix govulncheck scan confirms GO-2026-4864 no longer detected
      - All unit tests pass with go1.25.9

      Resolves: ACM-33482

      Co-authored-by: Coleen Iona Quadros <coleen.quadros27@gmail.com>
      Co-authored-by: Claude Sonnet 4.6 <noreply@anthropic.com>
