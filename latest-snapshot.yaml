    pac.test.appstudio.openshift.io/sha-title: |-
      fix: pin clusteradm to v1.2.0 for e2e tests (#651)

      Pin clusteradm version to v1.2.0 (which deploys OCM v1.2.0) to avoid
      the v1beta1 sentinel value bug in OCM v1.3.0 that causes e2e test
      failures with 'addon deployment config desired spec hash is empty'.

      OCM v1.2.0 has v1beta1 APIs and conversion webhook, but uses v1alpha1
      internally and does not have the sentinel value leak bug.

      Signed-off-by: Tesshu Flower <tflower@redhat.com>
      Co-authored-by: Tesshu Flower <tflower@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
