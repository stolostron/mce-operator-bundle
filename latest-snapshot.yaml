    pac.test.appstudio.openshift.io/sha-title: |-
      Update Go to 1.25.8 to fix CVE-2026-25679 (#1944)

      * Update Go to 1.25.8 to fix CVE-2026-25679

      This update addresses CVE-2026-25679 in the Go stdlib net/url package.
      CVE-2026-32280 still requires Go 1.25.9 which is not yet available.

      Related: ACM-31123, ACM-32834

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Add note about known GCS authentication issue in KinD workflow

      The setup-envtest tool used in unit tests cannot authenticate with Google
      Cloud Storage in CI, resulting in 401 Unauthorized errors when downloading
      Kubernetes test binaries. This is a CI infrastructure issue. Local tests
      pass successfully.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Disable WatchListClient in unit tests to fix cache sync timeouts

      The controller tests were failing with cache sync timeouts when using
      k8s.io v0.35.3 with controller-runtime v0.19.4. This is the same issue
      fixed in PR #1915 for the deployed controller.

      The WatchListClient feature in k8s.io v0.35.3 requires bookmark events
      that cause timeouts in the test environment. Setting the feature gate
      to false in suite_test.go makes the test environment consistent with
      the deployment configuration.

      Fixes unit test failures:
      - failed to wait for discoveryconfig caches to sync
      - failed to wait for managedcluster caches to sync

      Related: ACM-32357
      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Restore setup-envtest flags to fix KinD workflow

      The KinD workflow was failing with 'exec: etcd: executable file not found'
      because we had removed the --arch=amd64 and --bin-dir flags from the
      setup-envtest command.

      Restoring the original flags:
      - --arch=amd64: specifies architecture for binary download
      - --bin-dir=$(LOCALBIN): tells setup-envtest where to store binaries

      Also restoring setup-envtest@latest instead of @release-0.17 since the
      @latest version (which requires Go 1.26) only applies when installing
      the tool itself, not when downloading the K8s test binaries.

      This should fix the test failures seen in GitHub Actions KinD workflow.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Fix CodeRabbit issues: GOTOOLCHAIN fallback and setup-envtest version

      Addressed two critical issues identified by CodeRabbit:

      1. Fixed GOTOOLCHAIN fallback logic (line 53):
         - Previous: grep | cut || echo pipeline failed because cut succeeds
           on empty input, preventing fallback from triggering
         - Result: GOTOOLCHAIN became empty string when no toolchain directive
         - Fixed: Use awk to handle both cases in one pass, correctly producing
           'go1.25.8' when toolchain directive is absent

      2. Pinned setup-envtest to Go 1.25-compatible version:
         - setup-envtest@latest now requires Go 1.26+
         - Exported GOTOOLCHAIN forces Go 1.25.8, causing install failure
         - Pinned to v0.0.0-20260404204528-885e77d7d9fc (last version
           compatible with Go 1.25.x)

      This ensures the Makefile works correctly when go.mod lacks a toolchain
      directive and prevents CI failures from version incompatibilities.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Fix setup-envtest version: use release-0.17 tag instead of pseudo-version

      CodeRabbit's suggested version v0.0.0-20260404204528-885e77d7d9fc still
      requires Go 1.26.0, causing the build to fail:

        sigs.k8s.io/controller-runtime/tools/setup-envtest@v0.0.0-20260404204528-885e77d7d9fc
        requires go >= 1.26.0 (running go 1.25.8; GOTOOLCHAIN=go1.25.8)

      Using the release-0.17 tag instead, which is compatible with Go 1.25.x.
      Tested locally and confirmed it installs successfully with Go 1.25.8.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Use new index-based download for setup-envtest to avoid GCS 401 error

      The setup-envtest tool defaults to downloading binaries from Google Cloud
      Storage (GCS), which requires authentication and causes 401 Unauthorized
      errors in GitHub Actions:

        unable to list versions to find latest one: unable list bucket items
        -- got status "401 Unauthorized" from GCS

      Added --use-deprecated-gcs=false flag to use the new index-based download
      method from the controller-tools repository instead:
        https://raw.githubusercontent.com/kubernetes-sigs/controller-tools/HEAD/envtest-releases.yaml

      This successfully downloads etcd, kube-apiserver, and kubectl without
      authentication issues.

      Tested locally and confirmed binaries download correctly.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Remove outdated GCS authentication issue comment from KinD workflow

      The GCS 401 Unauthorized error has been resolved by using the new
      index-based download method (--use-deprecated-gcs=false) in the
      Makefile test target. The workflow should now pass successfully.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
