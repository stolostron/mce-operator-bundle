    pac.test.appstudio.openshift.io/sha-title: |-
      Sort MCE status conditions by lastTransitionTime (#3022)

      Sort conditions by lastTransitionTime instead of lastUpdateTime to ensure
      the most recently transitioned condition appears last in the status array.

      This ensures the Message column in 'oc get mce' displays the message from
      the condition that most recently changed state, which is more meaningful
      than displaying the message from the most recently updated condition.

