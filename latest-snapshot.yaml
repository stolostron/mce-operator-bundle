    pac.test.appstudio.openshift.io/sha-title: |-
      Add annotation-based resource adoption policy for MCE (#3025)

      * Add annotation-based resource adoption policy for MCE

      Implements resource adoption policy annotation for multiclusterengine
      to control how the operator handles existing resources without
      backplaneconfig labels.

      Changes:
      - Add AnnotationResourceAdoptionPolicy constant to pkg/utils/annotations.go
      - Add ensureResourceOwnership() function to check and adopt resources
      - Add getAdoptionPolicy() function to retrieve policy from MCE annotations
      - Update applyTemplate() to call ensureResourceOwnership() before updates
      - Update deleteTemplate() to call ensureResourceOwnership() before deletions
      - Add comprehensive unit tests for new functionality

      Valid policy values:
      - "Strict" (default): Only manage resources with backplaneconfig.name label
      - "Adopt": Adopt unlabeled resources by adding backplaneconfig.name label

      The annotation key is:
      installer.multicluster.openshift.io/resource-adoption-policy

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Add generic setDefaultAnnotations helper function

      Create a reusable function for setting default annotations on MCE instances.
      This makes it easy to add new default annotations in the future by simply
      adding them to the defaultAnnotations map.

      Currently sets resource-adoption-policy to "Strict" by default, making the
      default behavior explicit and allowing users to easily discover and modify
      the policy.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Fix resource ownership check to prevent cross-MCE conflicts

      Update ensureResourceOwnership to verify that the backplaneconfig.name
      label value matches the current MCE instance, not just check for label
      presence. This prevents conflicts when multiple MCE instances coexist
      in Hosted mode with different targetNamespaces.

      Changes:
      - Check label value matches mce.GetName() before managing resource
      - Skip resources owned by different MCE instances with log message
      - Add test coverage for cross-MCE ownership scenarios

      Addresses CodeRabbit feedback on PR #3025

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: dislbenn <dbennett@redhat.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
