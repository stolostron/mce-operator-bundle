    pac.test.appstudio.openshift.io/sha-title: |-
      Fix Prometheus duplicate label error in managed cluster metrics (#590)

      Prevents invalid Prometheus metrics when multiple ManagedCluster labels
      convert to the same sanitized name (e.g., 'cluster-elm-sa-name' and
      'cluster.elm.sa/name' both become 'cluster_elm_sa_name'). Uses a hash
      map for O(1) duplicate detection instead of O(n²) linear search. Adds
      warning logs when duplicate labels are skipped.

      Fixes the issue where Prometheus fails to scrape metrics with error:
      "label name 'cluster_elm_sa_name' is not unique: invalid sample"

      Signed-off-by: Qing Hao <qhao@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
    pac.test.appstudio.openshift.io/sha-url: https://github.com/stolostron/clusterlifecycle-state-metrics/commit/0cf17958d8da7983d7b6d84f98b0661d48bf7498
