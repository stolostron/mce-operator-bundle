    pac.test.appstudio.openshift.io/sha-title: "\U0001F41B fix(deps): upgrade helm
      to v3.18.6 [security] using replace directives (backplane-2.7) (#662)\n\n* fix(deps):
      upgrade helm.sh/helm/v3 to v3.18.6 [security] with replace directives\n\nUpgrade
      helm to v3.18.6 to fix CVE GHSA-9h84-qmv7-982p (JSON Schema\nmemory exhaustion)
      and GHSA-f9f8-9pmf-xv68 (YAML panic).\n\nInstead of cascading all dependencies
      to newer k8s.io versions (v0.33)\nand OCM dependencies (v1.1.0) which would
      introduce breaking changes\nand require extensive source code modifications,
      this PR uses Go\nreplace directives to pin k8s.io packages at v0.30.14 (same
      minor,\nlatest patch) and keep all OCM dependencies unchanged.\n\nThis approach
      results in zero source code changes while still\nresolving the helm security
      vulnerabilities.\n\nReplace strategy pins:\n- k8s.io/* => v0.30.14 (from v0.30.3)\n-
      sigs.k8s.io/controller-runtime => v0.18.5 (unchanged)\n- cel-go, genproto, antlr
      => original versions\n- OCM addon-framework, api, sdk-go => unchanged\n\nCo-Authored-By:
      Claude Opus 4.6 (1M context) <noreply@anthropic.com>\nSigned-off-by: xuezhaojun
      <zxue@redhat.com>\n\n* docs: add comment explaining replace directives in go.mod\n\nCo-Authored-By:
      Claude Opus 4.6 (1M context) <noreply@anthropic.com>\nSigned-off-by: xuezhaojun
      <zxue@redhat.com>\n\n---------\n\nSigned-off-by: xuezhaojun <zxue@redhat.com>\nCo-authored-by:
      Claude Opus 4.6 (1M context) <noreply@anthropic.com>"
