    pac.test.appstudio.openshift.io/sha-title: |-
      Fix CVE-2026-35206: Upgrade Helm to v3.20.2 (#3431)

      Upgrade helm.sh/helm/v3 from v3.18.5 to v3.20.2 to fix CVE-2026-35206.

      CVE-2026-35206 is a MODERATE severity path traversal vulnerability where
      specially crafted Helm charts can write files outside expected directories
      via dot-segments in Chart.yaml names. Fixed in Helm v3.20.2 via explicit
      validation rejecting POSIX dot-segments ("." or "..") and path separators
      in chart names.

      Helm v3.20.2 upgrade also pulls k8s.io/apiextensions-apiserver v0.35.1
      (transitive dependency).

      golang.org/x/crypto remains at v0.50.0 which already satisfies
      CVE-2025-47914 fix requirement (v0.45.0+).

      No code changes required - main already has controller-runtime v0.23.1
      and updated webhook API from previous upgrades.

      Related Jira: ACM-34532

      Signed-off-by: dislbenn <dbennett@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
