    pac.test.appstudio.openshift.io/sha-title: |-
      ACM-30181 ACM-31240  Inherit TLS profile from OpenShift APIServer (#3106)

      * Add TLS profile ConfigMap infrastructure

      Add utility functions and rendering support for creating TLS profile
      ConfigMaps in OCM namespaces. Includes:
      - GetAPIServerTLSProfile() to read OpenShift APIServer TLS config
      - OpenSSL to IANA cipher suite conversion with lookup table
      - EnsureTLSProfileConfigMap() to create/update ConfigMap
      - Namespace lookup table for open-cluster-management-hub and
        open-cluster-management-agent

      The ConfigMap will contain minTLSVersion and cipherSuites in IANA
      format, sourced from the cluster's APIServer TLS security profile.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Integrate TLS profile ConfigMap into reconcile loop

      Add TLS profile ConfigMap creation in the applyTemplate function
      after namespace existence check. The ConfigMap is created in
      open-cluster-management-hub and open-cluster-management-agent
      namespaces when templates are applied to those namespaces.

      Also add RBAC annotation for reading APIServer resources from
      config.openshift.io API group.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Add unit tests for TLS profile ConfigMap functionality

      Add comprehensive unit tests for:
      - ConvertCipherSuitesToIANA: Tests OpenSSL to IANA cipher conversion
        including TLS 1.3, TLS 1.2, Old profile, unknown ciphers, and
        empty lists
      - GetAPIServerTLSProfile: Tests unit test mode returning Intermediate
        profile
      - NamespaceRequiresTLSProfile: Tests namespace lookup for both OCM
        hub and agent namespaces
      - EnsureTLSProfileConfigMap: Basic test verifying function exists

      All tests pass successfully.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * refactored configmap to be specific to cluster-manager

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * debug line

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Fix TLS ConfigMap namespace to use operator namespace

      Deploy ocm-tls-profile ConfigMap to operator namespace (mce.Spec.TargetNamespace)
      instead of hardcoded "open-cluster-management-hub". Cluster-manager operator runs
      in multicluster-engine namespace and watches ConfigMap there.

      Fixes unit test failures where hardcoded namespace didn't exist.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>
      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Inherit TLS profile from OpenShift APIServer

      Remove hardcoded TLS 1.2 configuration from webhook server.
      Fetch TLS security profile dynamically from OpenShift APIServer resource.
      Defaults to Intermediate profile if not set.
      Adds RBAC permission to read config.openshift.io/apiservers.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Fix ctx redeclaration in main.go

      Change ctx := to ctx = at line 232 since ctx already declared at line 182.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Add RBAC permission for discovery-operator to read APIServer TLS profile

      Discovery operator now reads OpenShift APIServer TLS profile to configure
      webhook server TLS settings. Updated ClusterRole template to grant
      apiservers.config.openshift.io read permissions.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Run go generate to update RBAC permissions

      Added apiserver RBAC rule from discovery template.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Add cipher suite configuration from TLS profile

      Enhanced TLS profile inheritance to include cipher suites in addition
      to minimum TLS version. Updates webhook server configuration to:

      - Convert OpenShift cipher suite names to crypto/tls constants
      - Apply cipher suites for TLS ≤ 1.2 (TLS 1.3 ciphers auto-managed)
      - Use secure default cipher list in fallback TLSProfileSpec

      Implements ConvertCipherSuites() utility to map OpenSSL cipher names
      to Go crypto/tls uint16 constants, handling only supported ciphers.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * Add unit tests for TLS conversion functions

      Add comprehensive unit tests for ConvertTLSVersion and ConvertCipherSuites:
      - Test all TLS version conversions (1.0, 1.1, 1.2, 1.3)
      - Test default fallback to TLS 1.2 for unknown versions
      - Test OpenSSL to crypto/tls cipher suite conversion
      - Test TLS 1.3 cipher filtering (auto-managed by Go)
      - Test DHE cipher filtering (not supported in crypto/tls)
      - Test unknown cipher handling
      - Test CBC and GCM cipher conversions

      Coverage for pkg/utils increased from 67.5% to 73.1%.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Add comprehensive unit tests for EnsureTLSProfileConfigMaps

      Replace placeholder test with proper unit tests using fake Kubernetes client:
      - Test ConfigMap creation in single namespace
      - Test ConfigMap creation across multiple namespaces
      - Test handling of empty namespace list
      - Verify ConfigMap data contains minTLSVersion and cipherSuites
      - Verify cipherSuites is comma-separated IANA format
      - Verify controller reference to MultiClusterEngine is set correctly
      - Verify owner reference has controller=true flag

      Uses controller-runtime fake client builder for realistic testing
      without requiring live cluster.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Add nosec comments for false positive security warnings

      - Add #nosec G101 to ServiceMonitor BearerTokenFile: standard k8s
        service account token path, not a hardcoded credential
      - Add #nosec G122 to renderer.go filepath operation: reads from
        operator's own template directory (baked into image), not user input

      These are false positives blocking SonarCloud checks.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Fix GetAPIServerTLSProfile to work on non-OpenShift clusters

      Add check for DeployOnOCP() before attempting to query OpenShift
      APIServer resource. On non-OpenShift (vanilla Kubernetes) clusters,
      return default Intermediate TLS profile instead of failing with
      resource not found error.

      This allows EnsureTLSProfileConfigMaps to work on both OpenShift
      and vanilla Kubernetes clusters without breaking reconciliation.

      Add test coverage for non-OCP scenario.

      Coverage for pkg/utils increased from 73.1% to 73.7%.

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Fixed detectNonOCP ordering bug

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      * Fixed tests

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>

      ---------

      Signed-off-by: Nathaniel Graham <ngraham@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
