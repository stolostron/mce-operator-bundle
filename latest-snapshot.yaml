    pac.test.appstudio.openshift.io/sha-title: |-
      fix: force reinstall when MCE reconciliation strips OIDC S3 args (ACM-35409) (#719)

      * fix: force reinstall when MCE reconciliation strips OIDC S3 args (ACM-35409)

      When MCE reconciles/upgrades the HyperShift operator, it can overwrite the
      operator deployment without the OIDC S3 storage provider arguments. On the
      next addon agent startup, the skip-reinstall check saw no image or secret
      changes and silently skipped reinstallation, leaving the deployment without
      the OIDC args and causing all AWS HostedCluster creations to fail with
      ValidOIDCConfiguration: False.

      Fix: add a deploymentHasOIDCArgs check to the skip-reinstall condition.
      When the OIDC bucket secret is configured on the hub but the running
      deployment is missing --oidc-storage-provider-s3-bucket-name, the skip
      is rejected and a full reinstall is triggered to restore the OIDC args.

      Ref: https://redhat.atlassian.net/browse/ACM-35409
      Co-authored-by: Cursor <cursoragent@cursor.com>

      * fix: address CodeRabbit review comments on PR #719

      - deploymentHasOIDCArgs: check all three OIDC S3 flags (bucket-name,
        region, credentials/secret) using HasPrefix to handle both
        --flag value and --flag=value forms; returning true only when all
        three are present prevents a partially-stripped deployment from
        falsely satisfying the skip-reinstall guard
      - TestReinstallWhenOIDCArgsStripped: replace all unchecked Create()
        calls with require.NoError() so test setup failures are caught
        immediately rather than silently producing invalid state

      Co-authored-by: Cursor <cursoragent@cursor.com>

      * fix: add GOPROXY direct fallback to Dockerfile for module download resilience

      When proxy.golang.org returns an HTTP/2 INTERNAL_ERROR (stream error)
      for a module zip, Go's default GOPROXY does not automatically fall back
      to a direct VCS download. Setting GOPROXY=https://proxy.golang.org,direct
      enables the fallback so the build succeeds even when the proxy is unstable.
      GONOSUMDB=* skips the checksum database to reduce round-trips.

      Co-authored-by: Cursor <cursoragent@cursor.com>

      * revert: remove GOPROXY/GONOSUMDB env vars from Dockerfile

      Co-authored-by: Cursor <cursoragent@cursor.com>

      * fix: use exact flag matching in deploymentHasOIDCArgs to prevent false positives

      HasPrefix(arg, "--oidc-storage-provider-s3-region") incorrectly matches
      flags like "--oidc-storage-provider-s3-regionX". Replace each HasPrefix
      call with a new oidcFlagMatch helper that accepts arg == flag (space-
      separated form) or strings.HasPrefix(arg, flag+"=") (equals form),
      so only exact flag names are recognized.

      Co-authored-by: Cursor <cursoragent@cursor.com>

      ---------

      Co-authored-by: Cursor <cursoragent@cursor.com>
