    pac.test.appstudio.openshift.io/sha-title: |-
      fix: upgrade grpc to v1.79.3 for CVE-2026-33186 (backplane-2.6) - https://redhat.atlassian.net/browse/ACM-31669 (#1250)

      * fix: upgrade grpc to v1.79.3 for CVE-2026-33186 (backplane-2.6)

      Fixes CVE-2026-33186: gRPC-Go authorization bypass vulnerability.

      Upgraded google.golang.org/grpc from v1.62.1 to v1.79.3.

      The vulnerability affects gRPC-Go versions prior to 1.79.3 and can
      lead to authorization bypass due to improper HTTP/2 path validation.

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>

      * fix: upgrade otel to v1.43.0 for CVE-2026-29181 (backplane-2.6)

      Update go.opentelemetry.io/otel and related packages from v1.39.0 to
      v1.43.0 to address CVE-2026-29181.

      This commit adds the otel fix to the existing grpc CVE-2026-33186 fix
      for backplane-2.6.

      Related: https://redhat.atlassian.net/browse/ACM-31669

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: Tesshu Flower <tflower@redhat.com>

      ---------

      Signed-off-by: Tesshu Flower <tflower@redhat.com>
      Co-authored-by: Claude Sonnet 4.5 <noreply@anthropic.com>
