      fix: upgrade x/net and x/crypto to address CVE-2026-39821 and CVE-2026-46595 (#2168)

      Bumps golang.org/x/net v0.48.0 -> v0.55.0 to fix CVE-2026-39821
      (Punycode label processing privilege escalation in x/net/idna).

