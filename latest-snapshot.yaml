    pac.test.appstudio.openshift.io/sha-title: |-
      [ACM-9339] Add cluster_mgmt API support for ROSA clusters (#1880)

      * [ACM-9339] Add cluster_mgmt API support for ROSA clusters

      Fixes ACM-8927 by querying the cluster_mgmt API to get the correct
      API server URL for ROSA clusters instead of relying on heuristics.

      The heuristic approach (computing API URL from console URL) doesn't
      work for ROSA HCP clusters, which have different URL patterns and
      use port 443 instead of 6443.

      Changes:
      - Created pkg/ocm/cluster package with client to query individual
        clusters by ID from cluster_mgmt API
      - Updated discovery logic to query cluster_mgmt API for ROSA clusters
        (MOA, MOA-HostedControlPlane, ROSA, ROSA-HyperShift)
      - Non-ROSA clusters continue to use the existing heuristic
      - Graceful error handling: falls back to heuristic if cluster_mgmt
        API fails, ensuring discovery doesn't break
      - Added comprehensive unit tests with 97.1% coverage in pkg/ocm

      This approach minimizes API calls (only for ROSA) and is resilient
      to API failures, avoiding the issues that caused PR #199 to be
      reverted.

      Signed-off-by: Disaiah Bennett <dbennett@redhat.com>

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Fix formatting issues from make fmt

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Add 30s timeout to HTTP client to prevent indefinite blocking

      Addresses CodeRabbit feedback to add timeout to cluster API HTTP client.

      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Fix empty BaseURL for cluster_mgmt API client

      The cluster_mgmt API client was receiving an empty BaseURL because
      it directly used authRequest.BaseURL without defaulting it. Unlike
      the subscription client which sets its own default in NewClient(),
      the cluster client relied on the caller to provide the correct URL.

      This fix adds a default OCM base URL constant and uses it when
      authRequest.BaseURL is empty, ensuring the cluster_mgmt API calls
      use https://api.openshift.com by default.

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: dislbenn <dbennett@redhat.com>

      * Remove verbose success log for cluster_mgmt API

      Removed the DEBUG log that prints on every reconcile when successfully
      retrieving API URL from cluster_mgmt API. This was noisy during normal
      operation. Kept the failure/fallback logs which are useful for
      troubleshooting.

      Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>
      Signed-off-by: dislbenn <dbennett@redhat.com>

      ---------

      Signed-off-by: dislbenn <dbennett@redhat.com>
